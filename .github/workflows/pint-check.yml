name: Pint check

on:
  pull_request:
    paths:
      - '**.php'
      - 'pint.json'
      - '.github/workflows/pint-check.yml'

permissions:
  contents: read

concurrency:
  group: pint-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pint-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: '8.4'
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@5c2bcf28d7b060ef3c601d7b476d5430a7b46c27 # v4 (4.0.0)

      - name: Cache Pint results
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/pint/
          key: pint-cache-${{ hashFiles('pint.json') }}
          restore-keys: pint-cache-

      - name: Run Pint (test)
        run: vendor/bin/pint --test
