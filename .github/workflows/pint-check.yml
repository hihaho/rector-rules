name: Pint check

on:
  pull_request:
    paths:
      - '**.php'
      - 'pint.json'
      - '.github/workflows/pint-check.yml'

permissions:
  contents: read

concurrency:
  group: pint-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pint-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@26d8a556604053a9612623447203a691f406fbe6 # v4 (4.0.0)

      - name: Cache Pint results
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cache/pint/
          key: pint-cache-${{ hashFiles('pint.json') }}
          restore-keys: pint-cache-

      - name: Run Pint (test)
        run: vendor/bin/pint --test
