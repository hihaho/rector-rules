name: Rector check

on:
  pull_request:
    paths:
      - '**.php'
      - 'rector.php'
      - '.github/workflows/rector-check.yml'

permissions:
  contents: read

concurrency:
  group: rector-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rector-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@26d8a556604053a9612623447203a691f406fbe6 # v4 (4.0.0)

      - name: Cache Rector results
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .cache/rector/
            .cache/rectorContainer/
          key: rector-cache-${{ hashFiles('rector.php') }}
          restore-keys: rector-cache-

      - name: Ensure Rector cache directories exist
        run: mkdir -p .cache/rector .cache/rectorContainer

      - name: Run Rector (dry-run)
        run: vendor/bin/rector process --dry-run
