name: Auto-fix

on:
  push:
    paths:
      - '**.php'
      - 'rector.php'
      - 'pint.json'
      - '.github/workflows/auto-fix.yml'

permissions:
  contents: write

concurrency:
  group: auto-fix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Push-only workflow: head_ref is only set on pull_request events,
          # which we don't trigger on. ref_name is always the pushed branch
          # in our own repo, so there's no untrusted-fork surface here.
          ref: ${{ github.ref_name }}

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@26d8a556604053a9612623447203a691f406fbe6 # v4 (4.0.0)

      - name: Cache Rector results
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .cache/rector/
            .cache/rectorContainer/
          key: rector-cache-${{ hashFiles('rector.php') }}
          restore-keys: rector-cache-

      - name: Cache Pint results
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/pint/
          key: pint-cache-${{ hashFiles('pint.json') }}
          restore-keys: pint-cache-

      - name: Ensure Rector cache directories exist
        run: mkdir -p .cache/rector .cache/rectorContainer

      - name: Run Rector
        run: vendor/bin/rector process --no-diffs

      - name: Run Pint
        uses: aglipanci/laravel-pint-action@36de00d5f5a8a4e12d443e01671daa12a18f4c79 # 2.6
        with:
          configPath: pint.json
          verboseMode: true

      # Guard: never commit an auto-fix that breaks static analysis. Rector/Pint run in a
      # clean CI environment (fresh cache, PHP 8.4) and have produced output that fails
      # PHPStan level max — e.g. adding a contravariant `@param` to a rule's refactor()
      # override. Those commits used to land on `main` unverified, because a bot push does
      # not trigger the PHPStan workflow. Analyse the fixed tree here; if it fails, discard
      # the changes so the commit step has nothing to commit (the run stays green, main
      # stays clean) instead of shipping a broken auto-fix.
      - name: Discard auto-fixes that fail PHPStan
        run: |
          if vendor/bin/phpstan analyse --no-progress --memory-limit=2G; then
            echo "PHPStan passed — auto-fix changes (if any) will be committed."
          else
            echo "::warning::Auto-fix changes fail PHPStan — discarding them; nothing will be committed."
            git reset --hard HEAD
          fi

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: 'chore: auto-fix'
