version: 2
updates:

  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      composer-prod:
        dependency-type: production
      composer-dev:
        dependency-type: development
    commit-message:
      prefix: chore

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: ci
